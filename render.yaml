services:
  - type: web
    name: gestion-interna-api
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # Configurar manualmente en Render dashboard
      - key: FRONTEND_URL
        sync: false  # URL del frontend en Vercel (ej: https://gestion-interna.vercel.app)
      - key: DATABASE_URL
        sync: false  # URL de PostgreSQL
