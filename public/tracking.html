<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Reparación — BIT HOUSE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #00e5a0;
      --accent2: #7c6fff;
      --warn: #ff6b35;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --white: #ffffff;
      --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
  }

  body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
          radial-gradient(circle at 20% 30%, rgba(0, 229, 160, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(124, 111, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
  }

  .container {
      width: 100%;
      max-width: 500px;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
  }

  header {
      text-align: center;
      margin-bottom: 40px;
  }

  .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
  }
  .logo span { color: var(--accent); }
  .logo-icon {
      font-size: 1.8rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px;
  }

  .card {
      background: rgba(17, 17, 24, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .search-box {
      display: flex;
      gap: 8px;
      margin-top: 20px;
  }

  input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s;
  }
  input:focus { border-color: var(--accent2); box-shadow: 0 0 15px rgba(124, 111, 255, 0.2); }

  .btn-search {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 800;
      cursor: pointer;
      font-size: 1.4rem;
  }

  .result-area { display: none; margin-top: 10px; }
  .result-area.active { display: block; animation: fadeInUp 0.5s ease-out; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 15px 0;
      box-shadow: 0 0 20px rgba(0, 229, 160, 0.1);
  }

  .info-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .info-item:last-child { border-bottom: none; }
  .label { color: var(--muted); font-size: 0.85rem; }
  .value { font-weight: 500; }

  .timeline {
      position: relative;
      padding-left: 30px;
      margin-top: 25px;
  }
  .timeline::before {
      content: '';
      position: absolute;
      left: 7px; top: 0; bottom: 0;
      width: 2px;
      background: var(--border);
  }
  .timeline-item {
      position: relative;
      margin-bottom: 25px;
  }
  .timeline-dot {
      position: absolute;
      left: -30px; top: 3px;
      width: 14px; height: 14px;
      background: var(--surface2);
      border: 2px solid var(--accent);
      border-radius: 50%;
      z-index: 2;
  }
  .timeline-content {
      background: rgba(255,255,255,0.03);
      padding: 14px;
      border-radius: 12px;
  }
  .timeline-date { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 5px; }

  .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
  }
  .gallery-img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      object-fit: cover;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.3s;
  }
  .gallery-img:hover { transform: scale(1.05); }

  .error { color: var(--warn); text-align: center; margin-top: 10px; }
  
  .loader {
    width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Overlay para ver fotos grandes */
  #photoOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 20px;
  }
  #photoOverlay img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
  #photoOverlay.active { display: flex; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">📱</div>BIT <span>HOUSE</span>
    </div>
    <p style="color:var(--muted)">Reparando el futuro, hoy.</p>
  </header>

  <div class="card">
    <h3 style="margin-bottom:10px; font-family:'Syne',sans-serif">Seguimiento de Equipo</h3>
    <p style="font-size:0.85rem; color:var(--muted)">Ingresa el número de orden asignado a tu equipo.</p>
    
    <div class="search-box">
      <input type="text" id="orderInput" placeholder="EJ: BH-1002" maxlength="10">
      <button class="btn-search" onclick="checkOrder()">🔍</button>
    </div>
    <div id="loader" class="loader"></div>
  </div>

  <div id="resultArea" class="result-area">
    <!-- El JS llenará esto -->
  </div>
</div>

<div id="photoOverlay" onclick="this.classList.remove('active')">
    <img id="overlayImg" src="" alt="Foto ampliada">
</div>

<script src="/js/utils.js"></script>
<script>
  // Detectar Enter
  document.getElementById('orderInput').onkeypress = (e) => { if(e.key === 'Enter') checkOrder(); };

  async function checkOrder() {
    const order = document.getElementById('orderInput').value.trim();
    if(!order) return;

    const result = document.getElementById('resultArea');
    const loader = document.getElementById('loader');

    result.classList.remove('active');
    loader.style.display = 'block';

    try {
        const data = await apiRequest(`/tracking/${order}`);
        renderResult(data);
        result.classList.add('active');
    } catch (e) {
        result.innerHTML = `<div class="card error">❌ Orden no encontrada. Verifica que el número sea correcto.</div>`;
        result.classList.add('active');
    } finally {
        loader.style.display = 'none';
    }
  }

  function renderResult(data) {
    const { equipo, historial, fotos } = data;
    
    const estados = {
        'pendientes': { label: 'En espera', color: 'var(--muted)' },
        'ingresado': { label: 'Recibido', color: 'var(--accent2)' },
        'en_diagnóstico': { label: 'En Diagnóstico', color: '#ffeb3b' },
        'en_reparación': { label: 'En Reparación', color: 'var(--warn)' },
        'listo': { label: 'Listo para retirar', color: 'var(--accent)' },
        'entregado': { label: 'Entregado', color: 'var(--muted)' }
    };

    const status = estados[equipo.estado_actual] || { label: equipo.estado_actual, color: 'var(--accent)' };

    let html = `
      <div class="card" style="text-align:center">
        <div class="label">Estado de tu equipo</div>
        <div class="status-badge" style="background:${status.color}20; color:${status.color}">${status.label}</div>
        
        <div style="margin-top:20px; text-align:left">
          <div class="info-item">
            <span class="label">Equipo</span>
            <span class="value">${equipo.marca_modelo}</span>
          </div>
          <div class="info-item">
            <span class="label">Orden</span>
            <span class="value" style="font-family:'DM Mono',monospace">${equipo.numero_orden}</span>
          </div>
          <div class="info-item">
            <span class="label">Ingreso</span>
            <span class="value">${new Date(equipo.fecha_ingreso).toLocaleDateString()}</span>
          </div>
        </div>
      </div>

      ${fotos && fotos.length > 0 ? `
        <div class="card">
          <h4 style="font-family:'Syne',sans-serif; margin-bottom:15px">📸 Galería de Reparación</h4>
          <div class="gallery">
            ${fotos.map(f => `
                <img class="gallery-img" src="${f.url}" alt="${f.tipo}" onclick="viewPhoto('${f.url}')">
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div class="card">
        <h4 style="font-family:'Syne',sans-serif; margin-bottom:15px">📋 Línea de Tiempo</h4>
        <div class="timeline">
          ${historial.map(h => `
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-content">
                <div style="font-weight:700; font-size:0.9rem">${(estados[h.estado_nuevo] || {label:h.estado_nuevo}).label}</div>
                <div style="font-size:0.85rem; color:var(--muted); margin-top:4px">${h.observaciones || ''}</div>
                <div class="timeline-date">${new Date(h.fecha_cambio).toLocaleString()}</div>
              </div>
            </div>
          `).reverse().join('')}
        </div>
      </div>
    `;
    
    document.getElementById('resultArea').innerHTML = html;
  }

  function viewPhoto(url) {
      document.getElementById('overlayImg').src = url;
      document.getElementById('photoOverlay').classList.add('active');
  }
</script>
</body>
</html>
   </script>
</body>

</html>
